  <div id="sidebar-divider"></div>
  <div id="sidebar-counters">
    <div class="counter-block">
      <span class="counter-label">Total Printed</span>
      <span class="counter-value" id="h-printed">—</span>
      <span class="counter-bad" id="h-printed-bad"></span>
    </div>
    <div class="counter-block stamped">
      <span class="counter-label stamped">Total Stamped</span>
      <span class="counter-value stamped" id="h-stamped">—</span>
      <span class="counter-bad" id="h-stamped-bad"></span>
    </div>

    <!-- Open Orders divider -->
    <div style="width:60%;height:1px;background:#c3e0b0;margin:4px auto;border-radius:2px;"></div>

    <!-- Total open orders (FBA excluded) -->
    <div class="counter-block" style="background:#e8f5ee;border-color:#9bc2a1;">
      <span class="counter-label" style="color:#0d6748;">Open Orders</span>
      <span class="counter-value" id="h-open-total" style="color:#0d6748;font-size:28px;">—</span>
      <span style="font-size:9px;color:#568e7b;letter-spacing:0.08em;" id="h-open-age"></span>
      <span style="font-size:8px;color:#9bc2a1;letter-spacing:0.06em;margin-top:1px;">excl. FBA</span>
    </div>

    <!-- Per-machine breakdown -->
    <div id="h-open-machines" style="display:flex;flex-direction:column;gap:5px;width:100%;"></div>

    <!-- FBA orders (separate) -->
    <div style="width:60%;height:1px;background:#c3e0b0;margin:4px auto;border-radius:2px;"></div>
    <div class="counter-block" style="background:#fff5eb;border-color:#e8b07a;border-width:1.5px;">
      <span class="counter-label" style="color:#b86a1a;letter-spacing:0.12em;">FBA Orders</span>
      <span class="counter-value" id="h-fba-total" style="color:#c4770a;font-size:28px;">—</span>
      <span style="font-size:8px;color:#c4770a;letter-spacing:0.06em;opacity:0.7;">Fulfilled by Amazon</span>
    </div>

    <!-- Upload button -->
    <label style="font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;font-weight:700;background:#0d6748;color:#fff;border-radius:6px;padding:6px 10px;cursor:pointer;letter-spacing:0.06em;text-align:center;width:100%;margin-top:2px;">
      ⬆️ Load Orders File
      <input type="file" id="orders-file-input" accept=".xlsx,.xls" style="display:none;"/>
    </label>
  </div>
  <div id="sidebar-date">
    <div id="today-date"></div>
    <div id="last-updated"></div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="content">

  <!-- HOURLY CHART -->
  <div id="chart-section">
    <div class="section-title">Production by Hour — Today</div>
    <div id="chart-legend"></div>
    <canvas id="hourly-chart" style="width:100%;display:block;"></canvas>
  </div>

  <!-- MACHINE CARDS -->
  <div>
    <div class="section-title">Machine Summary — Today</div>
    <div id="cards-grid"></div>
  </div>

  <!-- PREVIOUS DAY -->
  <div>
    <div class="section-title" id="prev-day-title">Previous Day Summary</div>
    <!-- Department totals -->
    <div id="prev-dept-row" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:7px;"></div>
    <!-- Per machine -->
    <div id="prev-machine-grid" style="display:grid;grid-template-columns:repeat(6,1fr);gap:7px;"></div>
  </div>

</div>

</body>
